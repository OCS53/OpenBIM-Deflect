# pipeline-spike: 개발용 CLI/스크립트 (소스 마운트)
# api: FastAPI + 스파이크 파이프라인
# worker: Celery (Redis 브로커) — POST /api/v1/jobs 비동기 실행
# redis: 브로커·결과 백엔드

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # `docker compose up api` 만 해도 redis·worker 가 같이 뜹니다. worker 없으면 /jobs 작업이 pending 에서 끝나지 않습니다.
  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: openbim-deflect-api:local
    ports:
      - "8000:8000"
    environment:
      REPO_ROOT: /work
      JOB_DATA_DIR: /work/backend/data/jobs
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PIPELINE_TIMEOUT_SEC: "86400"
      CELERY_TASK_TIME_LIMIT_SEC: "86400"
    volumes:
      - api_job_data:/work/backend/data
    depends_on:
      - redis
      - worker

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: openbim-deflect-api:local
    working_dir: /work/backend
    command: celery -A app.celery_app worker --loglevel=info
    environment:
      REPO_ROOT: /work
      JOB_DATA_DIR: /work/backend/data/jobs
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PIPELINE_TIMEOUT_SEC: "86400"
      CELERY_TASK_TIME_LIMIT_SEC: "86400"
    volumes:
      - api_job_data:/work/backend/data
    depends_on:
      - redis

  pipeline-spike:
    build:
      context: .
      dockerfile: docker/spike/Dockerfile
    image: openbim-deflect-pipeline-spike:local
    working_dir: /work
    volumes:
      - .:/work

  # IFC 브라우저 뷰어 (Vite dev). 첫 기동 시 npm install 포함
  frontend:
    image: node:22-bookworm-slim
    working_dir: /work/frontend
    ports:
      - "5173:5173"
    environment:
      # 브라우저(호스트)에서 접근 가능한 API 주소 (Vite에 주입)
      VITE_API_URL: http://localhost:8000
    volumes:
      - .:/work
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  api_job_data:
